<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AN Psixoloji Mərkəzi — Diaqnostik Qiymətləndirmə</title>
<link rel="icon" type="image/png" href="logo.png" />
<meta name="theme-color" content="#6A0000" />
<meta name="description" content="AN Psixoloji Dəstək və Reabilitasiya Mərkəzi — xüsusi qayğıya ehtiyacı olan uşaqlar üçün diaqnostik qiymətləndirmə sistemi." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bordo:#6A0000; --bordo2:#420000; --cream:#FAF6F0; --cream2:#F2EADD;
    --gold:#C9973A; --gold2:#E8B96A; --sage:#4A7C59; --teal:#1A6B72;
    --ink:#0D0A14; --ink-soft:#5b5550; --line:#E6DCCD; --white:#fff;
    --surface:#fff; --shadow:0 18px 50px -28px rgba(66,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  h1,h2,h3,.serif{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:-.01em;line-height:1.12}
  .mono{font-family:'DM Mono',monospace}
  a{color:inherit}
  img{max-width:100%;display:block}
  .view{display:none}.view.active{display:block;animation:fade .5s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  /* reveal on scroll */
  .rv{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
  .rv.in{opacity:1;transform:none}

  /* ---------- HEADER ---------- */
  header.nav{position:sticky;top:0;z-index:60;background:rgba(250,246,240,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;gap:18px;height:70px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;border:none;background:none;color:var(--ink);min-width:0}
  .brand-logo{width:42px;height:42px;border-radius:11px;object-fit:contain;background:#fff;flex:none;box-shadow:0 2px 8px rgba(66,0,0,.16)}
  .brand-txt{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;line-height:1.05;white-space:nowrap}
  .brand-txt small{display:block;font-family:'DM Sans';font-weight:500;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-top:1px}
  .nav-links{display:flex;gap:3px;margin-left:auto;flex-wrap:wrap}
  .nav-links button{font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink-soft);background:none;border:none;padding:8px 12px;border-radius:9px;cursor:pointer;transition:.2s;white-space:nowrap}
  .nav-links button:hover{color:var(--bordo);background:var(--cream2)}
  .nav-links button.active{color:var(--white);background:var(--bordo)}
  .lang{display:flex;gap:2px;background:var(--cream2);border-radius:10px;padding:3px}
  .lang button{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;border:none;background:none;color:var(--ink-soft);padding:5px 9px;border-radius:7px;cursor:pointer;transition:.2s}
  .lang button.active{background:var(--bordo);color:#fff}
  .menu-btn{display:none;margin-left:6px;background:none;border:none;cursor:pointer;color:var(--bordo)}
  .menu-btn svg{width:26px;height:26px}

  /* ---------- HERO (an-paketler tərzi fon) ---------- */
  .hero{position:relative;overflow:hidden;background:#070310;min-height:86vh;display:flex;align-items:center}
  .hero-bg{position:absolute;inset:0;will-change:transform;
    background:radial-gradient(ellipse 80% 60% at 28% 28%,rgba(106,0,0,.55) 0%,transparent 65%),
      radial-gradient(ellipse 55% 55% at 85% 78%,rgba(75,58,122,.34) 0%,transparent 60%),
      linear-gradient(180deg,#1A1525 0%,#060310 100%)}
  .hero-photo{position:absolute;inset:0;background:url('images/an1.jpg') center/cover no-repeat;opacity:.12;will-change:transform}
  .hero-fx{position:absolute;inset:0;overflow:hidden;pointer-events:none}
  .hero-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbPulse 6s ease-in-out infinite alternate}
  .hero-orb-1{width:480px;height:480px;top:-18%;left:-12%;background:rgba(106,0,0,.32)}
  .hero-orb-2{width:380px;height:380px;bottom:-14%;right:-10%;background:rgba(75,58,122,.26);animation-delay:-3s}
  .hero-orb-3{width:300px;height:300px;top:34%;left:46%;background:rgba(201,151,58,.13);animation-delay:-1.5s}
  @keyframes orbPulse{from{transform:scale(1)}to{transform:scale(1.15)}}
  .hero-shape{position:absolute;top:50%;left:50%;border:1px solid rgba(201,151,58,.14);border-radius:50%;animation:shapeSpin linear infinite}
  .hs1{width:640px;height:640px;animation-duration:44s}
  .hs2{width:440px;height:440px;animation-duration:32s;animation-direction:reverse;border-color:rgba(75,58,122,.16)}
  .hs3{width:250px;height:250px;animation-duration:22s;border-color:rgba(201,151,58,.22)}
  @keyframes shapeSpin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
  .particle{position:absolute;border-radius:50%;background:var(--gold2);opacity:0;animation:floatUp linear infinite}
  @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.55}90%{opacity:.18}100%{transform:translateY(-92vh) scale(.3);opacity:0}}
  .fly{position:absolute;display:grid;place-items:center;border-radius:14px;color:var(--gold2);
    background:rgba(232,185,106,.07);border:1px solid rgba(232,185,106,.16);backdrop-filter:blur(2px);
    animation:floaty ease-in-out infinite alternate}
  .fly svg{width:54%;height:54%}
  @keyframes floaty{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-18px) rotate(5deg)}}
  .hero-in{position:relative;z-index:2;padding:78px 0 84px;color:#fff}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);border:1px solid rgba(232,185,106,.4);padding:7px 15px;border-radius:100px;margin-bottom:22px}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--gold2);box-shadow:0 0 0 4px rgba(232,185,106,.22)}
  .hero h1{font-size:clamp(38px,6.4vw,70px);font-weight:600;max-width:16ch}
  .hero h1 em{font-style:italic;color:var(--gold2)}
  .hero .lead{margin-top:22px;max-width:60ch;font-size:clamp(16px,2vw,18.5px);color:rgba(255,255,255,.86);font-weight:300}
  .hero-stats{display:flex;gap:38px;margin-top:42px;flex-wrap:wrap}
  .hstat .n{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:600;color:var(--gold2);line-height:1}
  .hstat .l{font-size:13px;color:rgba(255,255,255,.72);margin-top:5px;max-width:18ch}
  .scroll-hint{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:3;color:rgba(255,255,255,.6);font-size:11px;letter-spacing:.2em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:7px}
  .scroll-hint svg{width:18px;height:18px;animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

  /* ---------- SECTIONS ---------- */
  section.block{padding:74px 0}
  .section-head{max-width:640px;margin-bottom:40px}
  .kicker{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .section-head h2{font-size:clamp(30px,4.4vw,46px)}
  .section-head p{margin-top:14px;color:var(--ink-soft);font-size:16px}

  /* test cards */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.2,.7,.2,1),box-shadow .4s;cursor:pointer}
  .card:hover{transform:translateY(-7px);box-shadow:var(--shadow)}
  .card-img{height:150px;background-size:cover;background-position:center;position:relative}
  .card-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(66,0,0,0) 40%,rgba(66,0,0,.55))}
  .card-badge{position:absolute;left:14px;top:14px;z-index:2;background:rgba(250,246,240,.95);color:var(--bordo);font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:100px;letter-spacing:.04em}
  .card-body{padding:20px 21px 22px;display:flex;flex-direction:column;flex:1}
  .card h3{font-size:23px;font-weight:600;margin-bottom:3px}
  .card .full{font-size:12.5px;color:var(--gold);font-weight:500;margin-bottom:11px;font-family:'DM Mono',monospace}
  .card .desc{font-size:14px;color:var(--ink-soft);flex:1}
  .card .meta{display:flex;gap:8px;margin:15px 0 4px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft);background:var(--cream2);padding:5px 10px;border-radius:8px}
  .chip svg{width:13px;height:13px;color:var(--gold)}
  .btn{font-family:inherit;font-weight:600;font-size:14.5px;border:none;border-radius:11px;padding:13px 18px;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn svg{width:17px;height:17px}
  .btn-primary{background:var(--bordo);color:#fff}
  .btn-primary:hover{background:var(--bordo2)}
  .card .btn{margin-top:16px;width:100%}
  .btn-ghost{background:var(--cream2);color:var(--bordo)}
  .btn-ghost:hover{background:#e7dcc9}
  .btn-gold{background:var(--gold);color:#3a2a08}
  .btn-gold:hover{background:var(--gold2)}
  .btn-wa{background:#1FA855;color:#fff}.btn-wa:hover{background:#178a45}

  /* why */
  .why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .why-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px 24px}
  .why-ic{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--bordo),var(--bordo2));display:grid;place-items:center;color:var(--gold2);margin-bottom:16px}
  .why-ic svg{width:23px;height:23px}
  .why-card h3{font-size:21px;font-weight:600;margin-bottom:7px}
  .why-card p{font-size:14px;color:var(--ink-soft)}

  /* gallery */
  .gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .gallery .g{border-radius:16px;overflow:hidden;aspect-ratio:1;background-size:cover;background-position:center;transition:transform .5s}
  .gallery .g:hover{transform:scale(1.04)}
  .gallery .g.wide{grid-column:span 2;aspect-ratio:2}

  /* callout */
  .callout{border-radius:18px;padding:24px 26px;font-size:15px}
  .callout.note{background:linear-gradient(120deg,#FBF3E6,#F6EAD7);border:1px solid var(--line);color:#5a4326}
  .callout.note strong{color:var(--bordo)}

  /* ---------- TEST PAGE ---------- */
  .tp{padding:34px 0 70px;animation:fade .4s ease}
  .back{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:500;color:var(--bordo);background:none;border:none;cursor:pointer;margin-bottom:20px}
  .back svg{width:17px;height:17px}
  .tp-hero{position:relative;border-radius:22px;overflow:hidden;padding:40px 34px;color:#fff;margin-bottom:26px;background:var(--bordo2)}
  .tp-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.5}
  .tp-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,rgba(66,0,0,.93),rgba(106,0,0,.7))}
  .tp-hero-in{position:relative;z-index:2}
  .tp-hero .tag{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold2);letter-spacing:.04em}
  .tp-hero h2{font-size:clamp(28px,4vw,42px);font-weight:600;margin:6px 0 4px}
  .tp-hero .full{color:rgba(255,255,255,.8);font-size:15px;margin-bottom:12px}
  .tp-hero .sum{max-width:64ch;color:rgba(255,255,255,.9);font-weight:300}
  .tp-hero .ages{display:inline-flex;align-items:center;gap:7px;margin-top:16px;background:rgba(232,185,106,.2);border:1px solid rgba(232,185,106,.4);color:var(--gold2);padding:7px 14px;border-radius:100px;font-size:13px}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px 26px;margin-bottom:20px}
  .panel-head{display:flex;align-items:center;gap:11px;margin-bottom:18px}
  .panel-head .pic{width:38px;height:38px;border-radius:11px;background:var(--cream2);display:grid;place-items:center;color:var(--bordo);flex:none}
  .panel-head .pic svg{width:20px;height:20px}
  .panel-head h3{font-size:22px;font-weight:600}
  .panel-head .sub{font-size:13px;color:var(--ink-soft)}

  .instr{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .instr-col h4{font-size:13px;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .instr-col ul{list-style:none}
  .instr-col li{font-size:13.5px;color:var(--ink-soft);padding-left:20px;position:relative;margin-bottom:9px}
  .instr-col li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--gold)}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--ink)}
  .field input,.field select{width:100%;font-family:inherit;font-size:14.5px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--cream);color:var(--ink);transition:.2s}
  .field input:focus,.field select:focus{outline:none;border-color:var(--bordo);background:#fff;box-shadow:0 0 0 3px rgba(106,0,0,.08)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .form-grid .full-w{grid-column:1/-1}

  .off-note,.obs-note{font-size:13px;color:var(--ink-soft);background:var(--cream2);padding:11px 14px;border-radius:11px;margin-bottom:16px}
  .off-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .off-box label{font-size:13px;font-weight:500;display:block;margin-bottom:6px}
  .off-box .hint{font-size:11px;color:var(--gold);font-family:'DM Mono',monospace}
  .off-box input{width:100%;font-family:'DM Mono',monospace;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--cream);text-align:center}
  .off-box input:focus{outline:none;border-color:var(--gold);background:#fff}

  .domain{border:1px solid var(--line);border-radius:15px;margin-bottom:13px;overflow:hidden}
  .domain-h{display:flex;align-items:center;gap:11px;padding:15px 18px;background:var(--cream2);cursor:pointer}
  .domain-h .ix{width:26px;height:26px;border-radius:8px;background:var(--bordo);color:#fff;display:grid;place-items:center;font-family:'DM Mono',monospace;font-size:12px;flex:none}
  .domain-h h4{font-size:17px;font-weight:600;flex:1}
  .domain-h .cnt{font-size:12px;color:var(--ink-soft)}
  .domain-h .chev{transition:.3s;color:var(--ink-soft)}
  .domain.open .domain-h .chev{transform:rotate(180deg)}
  .domain-body{display:none;padding:6px 18px 14px}
  .domain.open .domain-body{display:block}
  .item{padding:13px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item p{font-size:14px;margin-bottom:9px}
  .opts{display:flex;gap:7px;flex-wrap:wrap}
  .opt{font-size:12.5px;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--ink-soft);padding:7px 13px;border-radius:9px;cursor:pointer;transition:.18s}
  .opt:hover{border-color:var(--gold)}
  .opt.sel{color:#fff;border-color:transparent}
  .opt.sel[data-v="0"]{background:var(--sage)}
  .opt.sel[data-v="1"]{background:var(--gold)}
  .opt.sel[data-v="2"]{background:#D98324}
  .opt.sel[data-v="3"]{background:var(--bordo)}

  .run-bar{position:sticky;bottom:0;z-index:40;background:rgba(250,246,240,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:14px 0;margin-top:6px}
  .run-in{display:flex;align-items:center;gap:18px}
  .prog{flex:1}
  .prog-track{height:8px;background:var(--cream2);border-radius:100px;overflow:hidden}
  .prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--bordo));border-radius:100px;transition:width .4s}
  .prog-lbl{font-size:12px;color:var(--ink-soft);margin-top:5px}

  /* ---------- RESULT ---------- */
  .result{animation:fade .45s ease}
  .res-head{text-align:center;padding:30px 0 26px}
  .res-head .seal{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--bordo),var(--bordo2));display:grid;place-items:center;color:var(--gold2);margin:0 auto 16px}
  .res-head .seal svg{width:30px;height:30px}
  .res-head h2{font-size:34px;font-weight:600}
  .res-head .who{color:var(--ink-soft);font-size:15px;margin-top:6px}
  .res-sec{margin-bottom:18px}
  .res-sec .rh{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:13px}
  .off-tags{display:flex;flex-wrap:wrap;gap:9px}
  .off-tag{background:var(--cream2);border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-size:13px}
  .off-tag b{font-family:'DM Mono',monospace;color:var(--bordo);font-size:15px}
  .dom-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
  .dom-row:last-child{border:none}
  .dom-row .dn{flex:1;font-size:14.5px;font-weight:500}
  .dom-row .bar{width:120px;height:8px;background:var(--cream2);border-radius:100px;overflow:hidden;flex:none}
  .dom-row .bar i{display:block;height:100%;border-radius:100px}
  .badge{font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;white-space:nowrap;flex:none;width:128px;text-align:center}
  .badge.ok{background:#E7F1EA;color:var(--sage)}
  .badge.warn{background:#FBF1DC;color:#B07D1E}
  .badge.high{background:#FBE7D5;color:#C0651A}
  .badge.crit{background:#F6E0DE;color:var(--bordo)}
  .explain{font-size:13.5px;color:var(--ink-soft);margin-top:8px}
  .rec-list{list-style:none}
  .rec-list li{font-size:14px;padding-left:24px;position:relative;margin-bottom:11px;color:#473f3a}
  .rec-list li::before{content:"";position:absolute;left:0;top:7px;width:9px;height:9px;border-radius:50%;border:2px solid var(--gold)}
  .parent-box{background:linear-gradient(125deg,#F0F5F1,#E9F1EC);border:1px solid #d8e6dc;border-radius:16px;padding:22px 24px}
  .parent-box .rh{color:var(--sage)}
  .games-box{background:linear-gradient(125deg,#FBF3E6,#F7ECD8);border:1px solid var(--line);border-radius:16px;padding:22px 24px;margin-top:14px}
  .games-box .rh{color:var(--gold)}
  .disc{font-size:12.5px;color:var(--ink-soft);background:var(--cream2);border-radius:12px;padding:14px 16px;margin-top:16px}
  .rep-actions{display:flex;gap:11px;flex-wrap:wrap;margin-top:22px}

  /* ---------- FOOTER ---------- */
  footer{background:var(--bordo2);color:#fff;margin-top:20px}
  .foot-top{display:flex;gap:34px;justify-content:space-between;flex-wrap:wrap;padding:54px 0 30px}
  .foot-brand{display:flex;align-items:center;gap:13px;max-width:330px}
  .foot-logo{width:50px;height:50px;border-radius:13px;object-fit:contain;background:#fff;flex:none}
  .foot-brand .ft{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;line-height:1.2}
  .foot-col h5{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);margin-bottom:14px}
  .foot-col a,.foot-col p{display:flex;align-items:center;gap:9px;color:rgba(255,255,255,.82);font-size:14px;text-decoration:none;margin-bottom:10px;transition:.2s}
  .foot-col a:hover{color:var(--gold2)}
  .foot-col svg{width:16px;height:16px;color:var(--gold2);flex:none}
  .foot-bottom{border-top:1px solid rgba(255,255,255,.12);padding:20px 0;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .foot-by{font-size:13.5px;color:rgba(255,255,255,.8);text-decoration:none}
  .foot-by b{color:var(--gold2)}
  .foot-note{font-size:12px;color:rgba(255,255,255,.55);max-width:100%;padding-bottom:30px;line-height:1.7}

  @media(max-width:920px){

  }

</style>
